name: SwiftLint

on:
  pull_request:
    paths:
      - "**/*.swift"
      - ".swiftlint.yml"
      - ".github/workflows/swiftlint-reviewdog.yml"

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install reviewdog
        uses: reviewdog/action-setup@v1

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint with reviewdog
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          swiftlint lint --config .swiftlint.yml --reporter checkstyle > swiftlint-report.xml
          swiftlint_exit_code=$?

          reviewdog \
            -f=checkstyle \
            -name="SwiftLint" \
            -reporter=github-pr-review \
            -filter-mode=added \
            -level=warning \
            -fail-level=none \
            < swiftlint-report.xml

          exit $swiftlint_exit_code
