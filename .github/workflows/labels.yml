name: Labels

on:
  push:
    branches:
      - main
    paths:
      - ".github/labels.json"
      - ".github/labeler.yml"
      - ".github/workflows/labels.yml"
      - "scripts/sync_github_labels.py"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - edited
    paths:
      - "**"
  issues:
    types:
      - opened
      - edited
      - reopened
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  sync-labels:
    name: Sync labels
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync GitHub labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/sync_github_labels.py .github/labels.json --prune

  pull-request-labeler:
    name: Label pull request
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Apply changed-file labels
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
          sync-labels: false

  issue-labeler:
    name: Label issue
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest

    steps:
      - name: Apply issue labels
        uses: actions/github-script@v8
        with:
          script: |
            const issue = context.payload.issue;
            const title = issue.title.toLowerCase();
            const body = (issue.body || "").toLowerCase();
            const text = `${title}\n${body}`;
            const labels = new Set(["status: needs-triage"]);
            const titleType = issue.title.match(/^\[([^\]]+)\]/);
            const typeByPrefix = {
              feat: "type: feature",
              feature: "type: feature",
              fix: "type: bug",
              bug: "type: bug",
              hotfix: "type: bug",
              refactor: "type: refactor",
              design: "type: design",
              docs: "type: docs",
              test: "type: test",
              chore: "type: chore",
              ci: "type: ci"
            };

            if (titleType) {
              const typeLabel = typeByPrefix[titleType[1].trim().toLowerCase()];
              if (typeLabel) {
                labels.add(typeLabel);
              }
            }

            const includesAny = (patterns) => patterns.some((pattern) => text.includes(pattern));
            const matchesAny = (patterns) => patterns.some((pattern) => pattern.test(text));

            const rules = [
              {
                label: "type: bug",
                includes: ["오류", "에러", "버그", "크래시", "동작 안"],
                matches: [/\bbug\b/, /\bfix\b/, /\bhotfix\b/, /\bcrash\b/]
              },
              {
                label: "type: feature",
                includes: ["기능 추가", "기능 요청"],
                matches: [/\bfeature\b/, /\bfeat\b/]
              },
              {
                label: "type: refactor",
                includes: ["리팩토링"],
                matches: [/\brefactor\b/]
              },
              {
                label: "type: design",
                includes: ["디자인", "화면", "색상", "다크모드", "라이트모드"],
                matches: [/\bdesign\b/, /\bui\b/, /\bux\b/]
              },
              {
                label: "type: docs",
                includes: ["문서", "가이드"],
                matches: [/\bdocs\b/, /\bdocument\b/, /\breadme\b/]
              },
              {
                label: "type: test",
                includes: ["테스트"],
                matches: [/\btest\b/]
              },
              {
                label: "type: ci",
                includes: ["자동화"],
                matches: [/\bci\b/, /\bactions\b/, /\bgithub actions\b/, /\bworkflow\b/, /\breviewdog\b/, /\bswiftlint\b/]
              },
              {
                label: "area: app",
                includes: ["앱", "진입점", "하단 탭", "탭바"],
                matches: [/\bapp\b/]
              },
              {
                label: "area: feature",
                includes: ["추천 화면", "기록 화면", "설정 화면"],
                matches: [/\bfeature\b/]
              },
              {
                label: "area: core",
                includes: ["네이버", "검색", "위치"],
                matches: [/\bcore\b/, /\bapi\b/, /\bservice\b/]
              },
              {
                label: "area: domain",
                includes: ["모델", "카테고리"],
                matches: [/\bdomain\b/, /\bmodel\b/]
              },
              {
                label: "area: design-system",
                includes: ["디자인 시스템", "컬러", "색상"],
                matches: [/\bdesignsystem\b/, /\bdesign system\b/]
              },
              {
                label: "area: tuist",
                includes: ["모듈"],
                matches: [/\btuist\b/, /\bworkspace\b/, /\bproject\.swift\b/]
              },
              {
                label: "area: config",
                includes: ["환경변수", "설정값", "키값"],
                matches: [/\bxcconfig\b/, /\benv\b/]
              },
              {
                label: "area: release",
                includes: ["배포"],
                matches: [/\bfastlane\b/, /\brelease\b/, /\btestflight\b/, /\bxcode cloud\b/]
              },
              {
                label: "risk: security",
                includes: ["보안", "비밀", "토큰"],
                matches: [/\bsecret\b/, /\bsecrets\b/, /\btoken\b/, /\bpassword\b/, /\bapi key\b/, /\bapikey\b/, /\bclient secret\b/]
              },
              {
                label: "risk: breaking-change",
                includes: ["호환성 깨", "breaking change"],
                matches: [/\bbreaking\b/]
              },
              {
                label: "priority: high",
                includes: ["긴급", "치명"],
                matches: [/\burgent\b/, /\bcritical\b/, /\bblocker\b/]
              }
            ];

            for (const rule of rules) {
              if (includesAny(rule.includes || []) || matchesAny(rule.matches || [])) {
                labels.add(rule.label);
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: Array.from(labels)
            });
